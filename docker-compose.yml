version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tecopos-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tecopos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tecopos123}
      POSTGRES_DB: ${DB_NAME:-tecopos_sso}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tecopos-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-tecopos}']
      interval: 10s
      timeout: 5s
      retries: 5

  sso:
    build:
      context: .
      args:
        APP_NAME: sso
    container_name: tecopos-sso
    environment:
      SSO_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-tecopos}
      DB_PASSWORD: ${DB_PASSWORD:-tecopos123}
      DB_NAME: ${DB_NAME:-tecopos_sso}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tecopos-net
    restart: unless-stopped

  banking:
    build:
      context: .
      args:
        APP_NAME: banking
    container_name: tecopos-banking
    environment:
      BANKING_PORT: 3002
    networks:
      - tecopos-net
    restart: unless-stopped

  gateway:
    build:
      context: .
      args:
        APP_NAME: gateway
    container_name: tecopos-gateway
    ports:
      - '3000:3000'
    environment:
      GATEWAY_PORT: 3000
      SSO_HOST: sso
      SSO_PORT: 3001
      BANKING_HOST: banking
      BANKING_PORT: 3002
    depends_on:
      - sso
      - banking
    networks:
      - tecopos-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tecopos-net:
    driver: bridge
