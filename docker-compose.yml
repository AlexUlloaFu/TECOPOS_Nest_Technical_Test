services:
  sso:
    build:
      context: .
      dockerfile: ./render/sso.Dockerfile
    container_name: tecopos-sso
    environment:
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_SSL: ${KAFKA_SSL:-true}
      KAFKA_SSL_REJECT_UNAUTHORIZED: ${KAFKA_SSL_REJECT_UNAUTHORIZED:-true}
      KAFKA_SSL_CA_BASE64: ${KAFKA_SSL_CA_BASE64:-}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-plain}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
    networks:
      - tecopos-net
    restart: unless-stopped

  banking:
    build:
      context: .
      dockerfile: ./render/banking.Dockerfile
    container_name: tecopos-banking
    environment:
      BANKING_API_BASE_URL: ${BANKING_API_BASE_URL:-https://69caaf2dba5984c44bf3a0d1.mockapi.io/api}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_SSL: ${KAFKA_SSL:-true}
      KAFKA_SSL_REJECT_UNAUTHORIZED: ${KAFKA_SSL_REJECT_UNAUTHORIZED:-true}
      KAFKA_SSL_CA_BASE64: ${KAFKA_SSL_CA_BASE64:-}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-plain}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
    networks:
      - tecopos-net
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: ./render/gateway.Dockerfile
    container_name: tecopos-gateway
    ports:
      - '3000:3000'
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_SSL: ${KAFKA_SSL:-true}
      KAFKA_SSL_REJECT_UNAUTHORIZED: ${KAFKA_SSL_REJECT_UNAUTHORIZED:-true}
      KAFKA_SSL_CA_BASE64: ${KAFKA_SSL_CA_BASE64:-}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-plain}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
    depends_on:
      sso:
        condition: service_started
      banking:
        condition: service_started
    networks:
      - tecopos-net
    restart: unless-stopped

networks:
  tecopos-net:
    driver: bridge
